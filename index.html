<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberGen AI V15.2</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-microchip"></i> CYBER-GEN</h2>
      <button class="btn-close" id="close-sidebar"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-content">
      <button class="new-chat-btn" id="new-chat-btn"><i class="fas fa-plus-circle"></i> Nueva Sesión</button>
      <div class="sidebar-divider"></div>
      <h3><i class="fas fa-cpu"></i> Modelo Activo</h3>
      <select class="model-select" id="model-select">
        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
      </select>
      <div class="sidebar-divider"></div>
      <h3><i class="fas fa-history"></i> Historial</h3>
      <div class="history-list" id="history-list"></div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-audio" id="toggle-audio-global"><i class="fas fa-volume-up"></i> Voz: <span id="audio-status-text">ON</span></button>
      <button class="btn-export" id="btn-download-session"><i class="fas fa-file-export"></i> Exportar TXT</button>
      <button class="btn-export" id="btn-clear-memory"><i class="fas fa-eraser"></i> Limpiar Memoria</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <button class="btn-menu" id="toggle-sidebar"><i class="fas fa-bars"></i></button>
      <div class="header-info">
        <h1>CYBER-GEN AI</h1>
        <span class="badge">V15.2</span>
      </div>
      <div class="header-status">
        <span class="dot" id="status-dot"></span>
        <span id="model-status">Núcleo Activo</span>
      </div>
      <button class="btn-clear" id="clear-chat"><i class="fas fa-trash-alt"></i></button>
    </header>

    <div class="chat-area" id="chat-box">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon"><i class="fas fa-brain" style="color: var(--neon-cyan);"></i></div>
        <h2>Bienvenido al Futuro</h2>
        <p>Conexión neuronal establecida</p>
        <div class="quick-actions">
          <button class="quick-btn" data-prompt="Analiza datos:"><i class="fas fa-chart-bar"></i> Analizar</button>
          <button class="quick-btn" data-prompt="Genera un gráfico:"><i class="fas fa-chart-pie"></i> Gráfico</button>
          <button class="quick-btn" data-prompt="Explica API REST:"><i class="fas fa-code"></i> API</button>
          <button class="quick-btn" data-prompt="Resume:"><i class="fas fa-file-alt"></i> Resumir</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="input-box">
        <button class="btn-mic" id="stt-btn"><i class="fas fa-microphone"></i></button>
        <label class="btn-file"><i class="fas fa-paperclip"></i>
          <input type="file" id="file-upload" hidden accept=".xlsx,.xls,.pdf,.csv,.txt,.json,.jpg,.jpeg,.png,.webp">
        </label>
        <textarea id="user-input" placeholder="Escribe tu comando..." rows="1"></textarea>
        <button class="btn-send" id="send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </footer>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="main.js"></script>

</body>
</html>
